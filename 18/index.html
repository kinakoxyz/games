<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>18</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #fdf500; --gold-dark: #b3a800; /* Neon Yellow */
    --red: #ff003c; --green: #00ff00; /* Neon Red / Green */
    --neon-cyan: #00ffff; --neon-pink: #ff00ff;
    --bg: #050508; 
    --surface: rgba(0, 255, 255, 0.03); 
    --surface2: rgba(255, 0, 255, 0.03);
    --border: var(--neon-cyan);
    --text: #e0f8ff; --text-muted: #5a7b8c;
    --radius: 0px; /* サイバーパンク風のシャープなエッジ */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    background-image: linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px);
    background-size: 100% 3px;
    min-height: 100vh; font-size: 14px;
  }
  h1, .logo { font-family: 'Black Han Sans', sans-serif; }

  #app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .screen { width: 100%; max-width: 500px; padding: 20px 16px 60px; }

  .logo-main {
    font-size: 56px; letter-spacing: 8px;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 3px 3px 0 var(--neon-pink);
    text-align: center; margin-bottom: 4px;
    font-style: italic;
  }
  .logo-sub { text-align: center; color: var(--text-muted); font-size: 13px; letter-spacing: 3px; margin-bottom: 32px; }

  .card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-left: 4px solid var(--neon-pink);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.05), inset 0 0 10px rgba(0, 255, 255, 0.02);
    border-radius: var(--radius); padding: 20px; margin-bottom: 12px; 
    position: relative;
  }
  .card::before { content:''; position:absolute; top:0; right:0; width:15px; height:15px; border-top:2px solid var(--neon-cyan); border-right:2px solid var(--neon-cyan); }
  .card::after { content:''; position:absolute; bottom:0; left:0; width:15px; height:15px; border-bottom:2px solid var(--neon-pink); border-left:2px solid var(--neon-pink); }
  
  .card-title { font-size: 13px; color: var(--neon-cyan); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 12px 24px; border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: rgba(0, 255, 255, 0.1); color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 255, 255, 0.2); }
  .btn-primary:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 15px rgba(0, 255, 255, 0.6); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255, 0, 255, 0.1); color: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 8px rgba(255, 0, 255, 0.3); }
  .btn-full { width: 100%; margin-bottom: 8px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  input[type=text] {
    width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.15s;
    box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.1);
  }
  input[type=text]:focus { border-color: var(--neon-pink); box-shadow: 0 0 8px rgba(255, 0, 255, 0.4), inset 0 0 5px rgba(255, 0, 255, 0.2); }
  label { display: block; font-size: 11px; color: var(--neon-cyan); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }

  .room-code {
    font-family: 'Black Han Sans', sans-serif; font-size: 36px; letter-spacing: 12px;
    color: var(--gold); text-shadow: 0 0 10px var(--gold); text-align: center; padding: 12px; background: var(--surface2);
    border: 1px dashed var(--gold); border-radius: var(--radius); margin-bottom: 8px;
  }

  .player-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .player-row:last-child { border-bottom: none; }
  .avatar {
    width: 32px; height: 32px; border-radius: 0; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0; background: rgba(0, 255, 255, 0.1); color: var(--neon-cyan); border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
  }

  .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .round-badge { background: rgba(253, 245, 0, 0.15); color: var(--gold); border: 1px solid var(--gold); padding: 6px 16px; border-radius: 0; font-weight: 700; font-size: 16px; box-shadow: 0 0 8px rgba(253, 245, 0, 0.3); }
  
  .battle-area { display: flex; flex-direction: column; gap: 24px; padding: 10px 0; }
  .player-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; }
  .player-box.me { border: 1px solid var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.1); }
  .p-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .p-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .p-score { font-size: 18px; font-weight: 700; color: var(--gold); text-shadow: 0 0 5px var(--gold); }
  
  .fingers-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .finger-mark { width: 14px; height: 24px; border-radius: 0; background: #222; border: 1px solid #444; transition: all 0.3s; }
  .finger-mark.active { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 8px var(--gold); }

  .choices-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
  .btn-choice {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface); border: 1px solid var(--border);
    padding: 16px 8px; border-radius: 0; cursor: pointer; transition: all 0.2s; color: var(--text);
  }
  .btn-choice:hover:not(:disabled) { border-color: var(--neon-pink); background: rgba(255, 0, 255, 0.1); box-shadow: 0 0 10px rgba(255, 0, 255, 0.3); }
  .btn-choice.selected { border-color: var(--neon-cyan); background: rgba(0, 255, 255, 0.2); transform: scale(0.95); box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }
  .btn-choice:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-choice .icon { font-size: 36px; margin-bottom: 8px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
  .btn-choice .name { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
  .btn-choice .cost { font-size: 12px; color: var(--gold); }

  .vs-badge { text-align: center; font-family: 'Black Han Sans', sans-serif; font-size: 28px; color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink); font-style: italic; }

  .log-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 0; padding: 12px; min-height: 80px; margin-top: 16px; max-height: 150px; overflow-y: auto; box-shadow: inset 0 0 10px rgba(0,255,255,0.05); }
  .log-entry { font-size: 12px; padding: 4px 0; border-bottom: 1px dashed var(--border); font-family: monospace; }
  .log-entry:last-child { border-bottom: none; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,255,255,0.2); border-top-color: var(--neon-cyan); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .rulebook-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:100; display:flex; align-items:flex-start; justify-content:center; overflow-y:auto; padding:16px; }
  .rulebook-content { background:var(--bg); border:2px solid var(--neon-pink); border-radius:0; width:100%; max-width:500px; padding:24px; margin:auto; box-shadow: 0 0 20px rgba(255,0,255,0.3); }
  .rule-section { margin-bottom:20px; }
  .rule-section h3 { font-size:14px; color:var(--neon-cyan); border-bottom:1px dashed var(--neon-cyan); padding-bottom:6px; margin-bottom:10px; text-transform: uppercase; letter-spacing: 1px; }
  .rule-row { display:flex; gap:10px; margin-bottom:8px; font-size:13px; line-height:1.6; }
  .rule-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
  .rule-table th, .rule-table td { border: 1px solid var(--neon-cyan); padding: 8px; text-align: center; }
  .rule-table th { background: rgba(0,255,255,0.1); color: var(--neon-cyan); }

  .toast-container {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  .toast {
    background: rgba(5, 5, 8, 0.95); border: 1px solid var(--neon-cyan);
    color: var(--text); padding: 12px 24px; border-radius: 0;
    font-weight: bold; font-size: 14px; text-align: center;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    animation: toast-in 0.3s ease-out, toast-out 0.3s ease-in 2.5s forwards;
    white-space: nowrap;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toast-out { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
</style>
</head>
<body>
<div id="app"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, off, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ============================================================
// 🔥 FIREBASE CONFIG (MASKMENと同じ設定をそのまま使用できます)
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyCW7voDrgpBC0AabZ_O3o1ZDKJ9fqnKa7k",
  authDomain: "grimoire-eclipse.firebaseapp.com",
  databaseURL: "https://grimoire-eclipse-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "grimoire-eclipse",
  storageBucket: "grimoire-eclipse.firebasestorage.app",
  messagingSenderId: "429385058377",
  appId: "1:429385058377:web:aaa1f22471f2bc938fd798",
  measurementId: "G-T35ZKBRW05"
};

let app_fb, db, auth;
let roomRef = null, roomListener = null;
let myPlayerIndex = -1;
let myName = "";
let roomCode = "";
let currentState = null;
let lastToastTime = 0;

const COSTS = { rock: 0, scissors: 2, paper: 5 };
const ICONS = { rock: '✊', scissors: '✌️', paper: '🖐️' };
const NAMES = { rock: 'グー', scissors: 'チョキ', paper: 'パー' };

try {
  app_fb = initializeApp(firebaseConfig);
  db = getDatabase(app_fb);
  auth = getAuth(app_fb);
  signInAnonymously(auth).catch(e => console.error("Auth Error", e));
} catch(e) { console.error("Firebase Init Error", e); }

function h(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
const el = document.getElementById("app");
function r(html) { el.innerHTML = html; }

// === Utils ===
function generateRoomCode() { return String(Math.floor(1000 + Math.random() * 9000)); }
function getWinner(h0, h1) {
  if (h0 === h1) return -1; // Draw
  if (h0 === 'rock' && h1 === 'scissors') return 0;
  if (h0 === 'scissors' && h1 === 'paper') return 0;
  if (h0 === 'paper' && h1 === 'rock') return 0;
  return 1; // p1 wins
}

// === DB Helpers ===
function listenRoom(code, cb) {
  if(!db) return;
  if(roomListener) off(ref(db, `games/rooms18/${roomCode}`)); // MASKMENと被らないようにツリーを分ける
  roomRef = ref(db, `games/rooms18/${code}`);
  roomListener = onValue(roomRef, snap => {
    if(snap.exists()) cb(snap.val());
  });
}

// === Screens ===
showSetup();

function showSetup() {
  r(`
    <div class="screen">
      <div class="logo-main" style="margin-bottom: 32px;">18</div>
      <div class="card">
        <div class="card-title">🆕 CREATE_ROOM</div>
        <label>あなたの名前</label>
        <input type="text" id="nameInput" placeholder="例: タロウ" value="${h(myName)}" maxlength="10" style="margin-bottom:16px">
        <button class="btn btn-primary btn-full" onclick="window._createRoom()">部屋を作る</button>
      </div>
      
      <div style="display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text-muted);margin:16px 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div> または <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      
      <div class="card">
        <div class="card-title">🚪 JOIN_ROOM</div>
        <label>あなたの名前</label>
        <input type="text" id="joinNameInput" placeholder="例: タロウ" value="${h(myName)}" maxlength="10" style="margin-bottom:16px">
        <label>ACCESS_CODE (4桁)</label>
        <input type="text" id="roomInput" placeholder="0000" maxlength="4" inputmode="numeric" style="margin-bottom:16px;letter-spacing:8px;text-align:center;font-size:24px;font-family:'Black Han Sans',sans-serif;">
        <button class="btn btn-ghost btn-full" onclick="window._joinRoom()">CONNECT</button>
      </div>

      <button class="btn btn-ghost btn-full" onclick="window._showRulebook()">[📖] DATABASE_RULE</button>
      <button class="btn btn-ghost btn-full" style="margin-top:8px;border-color:transparent;" onclick="location.href='../'">[🏠] RETURN_TO_LIST</button>
    </div>
  `);
}

window._createRoom = async function() {
  const name = document.getElementById("nameInput")?.value.trim();
  if(!name) { alert("名前を入力してください"); return; }
  myName = name; roomCode = generateRoomCode(); myPlayerIndex = 0;
  const state = {
    phase: "waiting",
    players: [{name}],
    round: 1,
    scores: [0, 0],
    fingers: [18, 18],
    p0_choice: null,
    p1_choice: null,
    history: []
  };
  await set(ref(db, `games/rooms18/${roomCode}`), state);
  listenRoom(roomCode, onRoomUpdate);
};

window._joinRoom = async function() {
  const name = (document.getElementById("joinNameInput")?.value || document.getElementById("nameInput")?.value).trim();
  const code = (document.getElementById("roomInput")?.value||"").trim().toUpperCase();
  if(!name) { alert("名前を入力してください"); return; }
  if(code.length !== 4) { alert("正しい部屋コードを入力してください"); return; }
  myName = name; roomCode = code;
  const snap = await get(ref(db, `games/rooms18/${code}`));
  if(!snap.exists()) { alert("部屋が見つかりません"); return; }
  const state = snap.val();
  
  const idx = state.players.findIndex(p => p.name === name);
  if (idx !== -1) {
    myPlayerIndex = idx; // 復帰
  } else {
    if(state.players.length >= 2) { alert("この部屋はすでに満員です"); return; }
    myPlayerIndex = 1;
    state.players.push({name});
    await set(ref(db, `games/rooms18/${code}`), state);
  }
  listenRoom(roomCode, onRoomUpdate);
};

function onRoomUpdate(state) {
  currentState = state;

  // 【処理フェーズの解決】ホストが勝敗を計算してDBを更新する（競合回避）
  if (state.phase === "playing" && state.p0_choice && state.p1_choice) {
    if (myPlayerIndex === 0) {
      const p0 = state.p0_choice; const p1 = state.p1_choice;
      const f0 = state.fingers[0] - COSTS[p0];
      const f1 = state.fingers[1] - COSTS[p1];
      const isBonus = (state.round === 6 || state.round === 10);
      const pts = isBonus ? 2 : 1;
      const win = getWinner(p0, p1);
      
      let s0 = state.scores[0]; let s1 = state.scores[1];
      if (win === 0) s0 += pts; else if (win === 1) s1 += pts;
      
      const hist = state.history || [];
      hist.push({ round: state.round, p0, p1, winner: win, pts: win === -1 ? 0 : pts });

      update(ref(db, `games/rooms18/${roomCode}`), {
        phase: "reveal",
        fingers: [f0, f1],
        scores: [s0, s1],
        history: hist
      });
    }
    return; // ホストの計算完了（DB更新）を待つ
  }

  const msgs = state.chatMessages || [];
  if (msgs.length > 0) {
    const lastMsg = msgs[msgs.length - 1];
    if (lastMsg.timestamp > lastToastTime) {
      lastToastTime = lastMsg.timestamp;
      showToast(state.players[lastMsg.senderIndex].name, lastMsg.text);
    }
  }

  const stateCopy = { ...state };
  delete stateCopy.chatMessages;
  const currentMainStateStr = JSON.stringify(stateCopy);
  const needsFullRender = (window._previousMainStateStr !== currentMainStateStr);

  if (needsFullRender) {
    if(state.phase === "waiting") renderWaiting(state);
    else if(state.phase === "playing") {
      renderGame(state);
      if (myPlayerIndex === 0 && state.players[1]?.isCpu && !state.p1_choice) {
        if (!window._cpuTimer18) window._cpuTimer18 = setTimeout(() => { window._cpuTimer18 = null; window._doCpuTurn18(); }, 1500);
      } else {
        if (window._cpuTimer18) { clearTimeout(window._cpuTimer18); window._cpuTimer18 = null; }
      }
    }
    else if(state.phase === "reveal") renderReveal(state);
    else if(state.phase === "ended") renderEnded(state);

    window._previousMainStateStr = currentMainStateStr;
    setTimeout(() => {
      const logBox = document.getElementById('chatLogBox');
      if (logBox) logBox.scrollTop = logBox.scrollHeight;
    }, 0);
  } else {
    const logBox = document.getElementById('chatLogBox');
    if (logBox) {
      const isAtBottom = logBox.scrollHeight - logBox.scrollTop - logBox.clientHeight <= 20;
      logBox.innerHTML = getChatLogHtml(state);
      if (isAtBottom) logBox.scrollTop = logBox.scrollHeight;
    }
  }
}

window._doCpuTurn18 = async function() {
  const snap = await get(ref(db, `games/rooms18/${roomCode}`));
  const state = snap.val();
  if (!state || state.phase !== "playing" || state.p1_choice) return;
  
  const f1 = state.fingers[1];
  const validHands = [];
  if (f1 >= COSTS.rock) validHands.push('rock');
  if (f1 >= COSTS.scissors) validHands.push('scissors');
  if (f1 >= COSTS.paper) validHands.push('paper');
  
  if (validHands.length > 0) {
    const choice = validHands[Math.floor(Math.random() * validHands.length)];
    update(ref(db, `games/rooms18/${roomCode}`), { p1_choice: choice });
  }
};
function renderWaiting(state) {
  const isHost = myPlayerIndex === 0;
  const canStart = state.players.length === 2;
  r(`
    <div class="screen">
      <div class="logo-main">18</div>
      <div class="card">
        <div class="card-title">部屋コードを対戦相手に教えよう</div>
        <div class="room-code">${h(roomCode)}</div>
        <p style="text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:16px">対戦相手を待っています...</p>
        <div style="height:1px;background:var(--border);margin:16px 0"></div>
        ${state.players.map((p,i) => `
          <div class="player-row">
            <div class="avatar">${p.isCpu ? '🤖' : (i===0?'H':'C')}</div>
            <span style="flex:1">${h(p.name)}</span>
            ${i===myPlayerIndex?'<span style="font-size:11px;color:var(--gold)">あなた</span>':""}
            ${p.isCpu?'<span style="font-size:11px;color:var(--text-muted)">CPU</span>':""}
          </div>
        `).join("")}
        <div style="margin-top:20px">
          ${isHost ? `
            <div style="display:flex; gap:8px; margin-bottom:12px;">
              <button class="btn btn-ghost" style="flex:1;font-size:12px;" onclick="window._addCpu()" ${state.players.length>=2?'disabled':''}>[🤖] ADD_CPU</button>
              <button class="btn btn-ghost" style="flex:1;font-size:12px;" onclick="window._removeCpu()" ${!(state.players.length===2&&state.players[1].isCpu)?'disabled':''}>[👋] REM_CPU</button>
            </div>
          ` : ""}
          ${isHost && canStart ? `<button class="btn btn-primary btn-full" onclick="window._startGame()">> EXECUTE_START</button>` : ""}
          ${!canStart ? `<p style="text-align:center;font-size:12px;color:var(--text-muted)"><span class="spinner"></span>相手の入室を待機中</p>` : ""}
          ${canStart && !isHost ? `<p style="text-align:center;font-size:12px;color:var(--text-muted)"><span class="spinner"></span>ホストの開始操作を待っています</p>` : ""}
          <button class="btn btn-ghost btn-full" style="margin-top:16px" onclick="if(confirm('本当に退室しますか？')) window._leaveRoom()">[🚪] DISCONNECT</button>
        </div>
      </div>
      ${renderChatUI(state)}
    </div>
  `);
}

window._addCpu = async function() {
  if (myPlayerIndex !== 0) return;
  const snap = await get(ref(db, `games/rooms18/${roomCode}`));
  const state = snap.val();
  if (state.players.length >= 2) return;
  state.players.push({ name: "CPU", isCpu: true });
  await set(ref(db, `games/rooms18/${roomCode}`), state);
};
window._removeCpu = async function() {
  if (myPlayerIndex !== 0) return;
  const snap = await get(ref(db, `games/rooms18/${roomCode}`));
  const state = snap.val();
  if (state.players.length === 2 && state.players[1].isCpu) {
    state.players.pop();
    await set(ref(db, `games/rooms18/${roomCode}`), state);
  }
};

window._startGame = function() {
  update(ref(db, `games/rooms18/${roomCode}`), { phase: "playing" });
};

function renderFingerBar(count) {
  let html = '<div class="fingers-bar">';
  for(let i=0; i<18; i++) {
    html += `<div class="finger-mark ${i < count ? 'active' : ''}"></div>`;
  }
  html += '</div>';
  return html;
}

function renderGame(state) {
  const oppIndex = 1 - myPlayerIndex;
  const isBonus = state.round === 6 || state.round === 10;
  
  const myChoiceKey = myPlayerIndex === 0 ? 'p0_choice' : 'p1_choice';
  const oppChoiceKey = oppIndex === 0 ? 'p0_choice' : 'p1_choice';
  
  const myChoice = state[myChoiceKey];
  const oppChoice = state[oppChoiceKey];

  r(`
    <div class="screen">
      <div class="header-bar">
        <span style="font-family:'Black Han Sans'; font-size:20px; color:var(--neon-cyan); text-shadow:0 0 5px var(--neon-cyan);">18</span>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="window._showRulebook()">📖 ルール</button>
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="if(confirm('本当に退室しますか？')) window._leaveRoom()">🚪 退室</button>
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="if(confirm('本当に退室しますか？')) window._leaveRoom()">🚪 退室</button>
        </div>
      </div>
      
      <div style="text-align:center; margin-bottom: 16px;">
        <div class="round-badge">第 ${state.round} 回戦 <span style="font-size:12px;font-weight:400;margin-left:4px">/ 全10回</span></div>
        <div style="font-size:12px; color:${isBonus ? 'var(--red)' : 'var(--text-muted)'}; margin-top:8px; font-weight:700;">
          ${isBonus ? '🔥 ボーナスラウンド！ 勝利: 2 pt' : '勝利: 1 pt'}
        </div>
      </div>

      <div class="battle-area">
        <!-- 相手エリア -->
        <div class="player-box">
          <div class="p-header" style="border-bottom:1px dashed var(--border); padding-bottom:8px;">
            <div class="p-name">⚔️ ${h(state.players[oppIndex].name)}</div>
            <div class="p-score">${state.scores[oppIndex]} <span style="font-size:11px;color:var(--text-muted)">pt</span></div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">残り指: ${state.fingers[oppIndex]}本</div>
          ${renderFingerBar(state.fingers[oppIndex])}
          <div style="margin-top:12px; text-align:center;">
             ${oppChoice ? `<span style="color:var(--neon-cyan);font-weight:700;text-shadow:0 0 5px var(--neon-cyan);">[OK] READY</span>` : `<span style="color:var(--text-muted);font-size:12px;font-family:monospace;"><span class="spinner"></span>PROCESSING...</span>`}
          </div>
        </div>

        <div class="vs-badge">VS</div>

        <!-- 自分のエリア -->
        <div class="player-box me">
          <div class="p-header" style="border-bottom:1px dashed var(--border); padding-bottom:8px;">
            <div class="p-name">👑 ${h(state.players[myPlayerIndex].name)} (あなた)</div>
            <div class="p-score">${state.scores[myPlayerIndex]} <span style="font-size:11px;color:var(--text-muted)">pt</span></div>
          </div>
          <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">残り指: ${state.fingers[myPlayerIndex]}本</div>
          ${renderFingerBar(state.fingers[myPlayerIndex])}
          
          <div class="choices-grid">
            ${['rock', 'scissors', 'paper'].map(hand => {
              const cost = COSTS[hand];
              const disabled = state.fingers[myPlayerIndex] < cost || myChoice;
              const selected = myChoice === hand;
              return `
                <button class="btn-choice ${selected ? 'selected' : ''}" onclick="window._playHand('${hand}')" ${disabled ? 'disabled' : ''}>
                  <div class="icon">${ICONS[hand]}</div>
                  <div class="name">${NAMES[hand]}</div>
                  <div class="cost">${cost}本</div>
                </button>
              `;
            }).join("")}
          </div>
          ${myChoice && !oppChoice ? `<div style="text-align:center;margin-top:12px;font-size:12px;color:var(--neon-pink);font-family:monospace;"><span class="spinner" style="border-top-color:var(--neon-pink);"></span>WAITING FOR OPPONENT...</div>` : ""}
        </div>
      </div>

      ${renderHistoryBox(state)}
      ${renderChatUI(state)}
    </div>
  `);
}

window._playHand = function(hand) {
  if(currentState.phase !== "playing") return;
  const myChoiceKey = myPlayerIndex === 0 ? 'p0_choice' : 'p1_choice';
  if(currentState[myChoiceKey]) return; // 二重送信防止

  if(currentState.fingers[myPlayerIndex] < COSTS[hand]) { alert("指が足りません！"); return; }
  
  const updates = {};
  updates[myChoiceKey] = hand;
  update(ref(db, `games/rooms18/${roomCode}`), updates);
};

function renderReveal(state) {
  const oppIndex = 1 - myPlayerIndex;
  const hist = state.history[state.history.length - 1]; // 最新の結果
  
  const myHand = myPlayerIndex === 0 ? hist.p0 : hist.p1;
  const oppHand = oppIndex === 0 ? hist.p0 : hist.p1;
  
  let resultTitle = "";
  let resultColor = "";
  if(hist.winner === -1) { resultTitle = "⚪ あいこ"; resultColor = "var(--text)"; }
  else if(hist.winner === myPlayerIndex) { resultTitle = `[WIN] あなたの勝利 (+${hist.pts}pt)`; resultColor = "var(--neon-cyan)"; }
  else { resultTitle = "[LOSE] 相手の勝利"; resultColor = "var(--red)"; }

  r(`
    <div class="screen">
      <div class="header-bar" style="justify-content:flex-end;">
        <div style="display:flex;gap:8px;">
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="window._showRulebook()">📖 ルール</button>
          <button class="btn btn-ghost" style="padding:6px 12px;font-size:11px" onclick="if(confirm('本当に退室しますか？')) location.href='../'">🚪 退室</button>
        </div>
      </div>
      <div class="card" style="text-align:center; padding: 32px 16px;">
        <div style="font-family:'Black Han Sans'; font-size:24px; color:var(--neon-pink); text-shadow:0 0 8px var(--neon-pink); margin-bottom: 24px;">第 ${state.round} 回戦 結果</div>
        
        <div style="display:flex; justify-content:space-around; align-items:center;">
          <div>
            <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px">あなた</div>
            <div style="font-size:48px;">${ICONS[myHand]}</div>
            <div style="font-size:12px; color:var(--red); text-shadow:0 0 5px var(--red); margin-top:8px">-${COSTS[myHand]}本</div>
          </div>
          <div style="font-size:24px; font-weight:700; color:var(--text-muted)">VS</div>
          <div>
            <div style="font-size:12px; color:var(--text-muted); margin-bottom:8px">相手</div>
            <div style="font-size:48px;">${ICONS[oppHand]}</div>
            <div style="font-size:12px; color:var(--red); text-shadow:0 0 5px var(--red); margin-top:8px">-${COSTS[oppHand]}本</div>
          </div>
        </div>
        
        <div style="font-size:20px; font-weight:700; color:${resultColor}; text-shadow:0 0 8px ${resultColor}; margin-top: 32px; padding: 12px; background: rgba(0,0,0,0.5); border: 1px dashed ${resultColor}; border-radius: 0;">
          ${resultTitle}
        </div>

        <div style="margin-top: 24px;">
          ${myPlayerIndex === 0 
            ? `<button class="btn btn-primary btn-full" onclick="window._nextRound()">> NEXT_ROUND</button>`
            : `<p style="font-size:12px; color:var(--text-muted)"><span class="spinner"></span>ホストが次へ進むのを待っています</p>`
          }
        </div>
      </div>
      ${renderHistoryBox(state)}
      ${renderChatUI(state)}
    </div>
  `);
}

window._nextRound = function() {
  if (myPlayerIndex !== 0) return;
  const isEnd = currentState.round >= 10;
  update(ref(db, `games/rooms18/${roomCode}`), {
    phase: isEnd ? "ended" : "playing",
    round: isEnd ? 10 : currentState.round + 1,
    p0_choice: null,
    p1_choice: null
  });
};

function renderEnded(state) {
  const oppIndex = 1 - myPlayerIndex;
  
  const fScore0 = state.scores[0] - state.fingers[0];
  const fScore1 = state.scores[1] - state.fingers[1];
  
  const myFinal = myPlayerIndex === 0 ? fScore0 : fScore1;
  const oppFinal = oppIndex === 0 ? fScore0 : fScore1;

  let topText = "", topColor = "";
  if (myFinal > oppFinal) { topText = "MISSION ACCOMPLISHED"; topColor = "var(--neon-cyan)"; }
  else if (myFinal < oppFinal) { topText = "SYSTEM FAILURE"; topColor = "var(--red)"; }
  else { topText = "DRAW"; topColor = "var(--gold)"; }

  r(`
    <div class="screen">
      <div class="logo-main" style="font-size:36px">GAME_SET</div>
      <div class="card" style="text-align:center;">
        <h2 style="color:${topColor}; text-shadow: 0 0 10px ${topColor}; margin-bottom: 24px; font-family:'Black Han Sans', sans-serif; letter-spacing:2px;">${topText}</h2>
        
        <table class="rule-table" style="margin-bottom: 24px;">
          <tr>
            <th></th>
            <th>あなた</th>
            <th>相手</th>
          </tr>
          <tr>
            <td style="color:var(--text-muted)">獲得ポイント</td>
            <td style="font-weight:700">${state.scores[myPlayerIndex]} pt</td>
            <td style="font-weight:700">${state.scores[oppIndex]} pt</td>
          </tr>
          <tr>
            <td style="color:var(--red)">余り指 (減点)</td>
            <td style="color:var(--red)">-${state.fingers[myPlayerIndex]} 本</td>
            <td style="color:var(--red)">-${state.fingers[oppIndex]} 本</td>
          </tr>
          <tr style="background:rgba(251, 192, 45, 0.1);">
            <td style="color:var(--gold); font-weight:700;">最終スコア</td>
            <td style="color:var(--gold); font-weight:700; font-size:18px">${myFinal} pt</td>
            <td style="color:var(--gold); font-weight:700; font-size:18px">${oppFinal} pt</td>
          </tr>
        </table>

        ${myPlayerIndex === 0 ? `
          <button class="btn btn-primary btn-full" onclick="window._rematch()">> REMATCH (もう一度遊ぶ)</button>
          <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="location.reload()">> LEAVE (最初の画面に戻る)</button>
          <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="location.href='../'">> EXIT (一覧に戻る)</button>
        ` : `
          <p style="font-size:12px; color:var(--text-muted); margin-bottom:12px"><span class="spinner"></span>ホストの操作を待機中</p>
          <button class="btn btn-ghost btn-full" onclick="location.reload()">> LEAVE (最初の画面に戻る)</button>
          <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="location.href='../'">> EXIT (一覧に戻る)</button>
        `}
      </div>
      ${renderHistoryBox(state)}
      ${renderChatUI(state)}
    </div>
  `);
}

window._rematch = function() {
  if (myPlayerIndex !== 0) return;
  // ラウンドやスコアなどのステートを初期化してゲームを再開する
  update(ref(db, `games/rooms18/${roomCode}`), {
    phase: "playing",
    round: 1,
    scores: [0, 0],
    fingers: [18, 18],
    p0_choice: null,
    p1_choice: null,
    history: []
  });
};

function renderHistoryBox(state) {
  if(!state.history || state.history.length === 0) return "";
  const histHtml = state.history.slice().reverse().map(h => {
    const myH = myPlayerIndex === 0 ? h.p0 : h.p1;
    const oppH = myPlayerIndex === 0 ? h.p1 : h.p0;
    let resStr = "";
    if(h.winner === -1) resStr = '<span style="color:var(--text-muted)">あいこ</span>';
    else if(h.winner === myPlayerIndex) resStr = `<span style="color:var(--neon-cyan)">勝利 (+${h.pts})</span>`;
    else resStr = `<span style="color:var(--red)">敗北</span>`;
    return `<div class="log-entry">R${h.round} : あなた ${ICONS[myH]} vs ${ICONS[oppH]} 相手 👉 ${resStr}</div>`;
  }).join("");
  return `<div class="card-title" style="margin-top:24px; margin-bottom:8px">> SYSTEM_LOG</div><div class="log-box">${histHtml}</div>`;
}

function showToast(name, text) {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span style="color:var(--neon-pink);margin-right:8px;">${h(name)}:</span>${h(text)}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function getChatLogHtml(state) {
  if (!state) return '';
  return (state.chatMessages || []).map(m => {
    const isMe = m.senderIndex === myPlayerIndex;
    return `<div style="text-align: ${isMe ? 'right' : 'left'};">
      <div style="display: inline-block; text-align: left;">
        <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 2px; text-align: ${isMe ? 'right' : 'left'};">${h(state.players[m.senderIndex].name)}</div>
        <div style="background: ${isMe ? 'rgba(0,255,255,0.1)' : 'var(--surface2)'}; color: var(--text); border: 1px solid ${isMe ? 'var(--neon-cyan)' : 'var(--border)'}; padding: 6px 12px; border-radius: 0; font-size: 12px; display: inline-block; max-width: 100%; word-break: break-all;">${h(m.text)}</div>
      </div>
    </div>`;
  }).join('') + (!(state.chatMessages && state.chatMessages.length > 0) ? '<div style="text-align:center; color:var(--text-muted); font-size:11px; margin-top: 40px; font-family:monospace;">NO_MESSAGES</div>' : '');
}

function renderChatUI(state) {
  if (!state) return '';
  return `
    <div style="margin-top:24px; padding-top:16px; border-top:1px dashed var(--border);">
      <div id="chatLogBox" style="height: 140px; overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 0; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px;">
        ${getChatLogHtml(state)}
      </div>
      <div style="display:flex; gap:8px; margin-bottom: 12px;">
        <input type="text" id="chatInput" placeholder="MESSAGE..." maxlength="30" onkeypress="if(event.key==='Enter') window._sendChat()" style="margin-bottom:0;">
        <button class="btn btn-primary" style="padding: 0 16px; flex-shrink: 0;" onclick="window._sendChat()">SEND</button>
      </div>
      <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-ghost" style="padding:8px 16px; font-size:16px;" onclick="window._sendStamp('👍 ナイス！')">👍</button>
        <button class="btn btn-ghost" style="padding:8px 16px; font-size:16px;" onclick="window._sendStamp('🤔 うーん...')">🤔</button>
        <button class="btn btn-ghost" style="padding:8px 16px; font-size:16px;" onclick="window._sendStamp('💡 わかった！')">💡</button>
        <button class="btn btn-ghost" style="padding:8px 16px; font-size:16px;" onclick="window._sendStamp('🙏 おまかせ！')">🙏</button>
        <button class="btn btn-ghost" style="padding:8px 16px; font-size:16px;" onclick="window._sendStamp('💦 ごめん！')">💦</button>
      </div>
    </div>
  `;
}

window._sendStamp = function(text) {
  if (!roomCode || !currentState) return;
  runTransaction(ref(db, `games/rooms18/${roomCode}/chatMessages`), (messages) => {
    const newMessages = messages || [];
    newMessages.push({ senderIndex: myPlayerIndex, text: text, timestamp: Date.now() });
    if (newMessages.length > 50) newMessages.shift();
    return newMessages;
  });
};

window._sendChat = function() {
  const input = document.getElementById('chatInput');
  if (!input || !input.value.trim() || !roomCode || !currentState) return;
  const text = input.value.trim();
  input.value = '';
  input.focus();
  runTransaction(ref(db, `games/rooms18/${roomCode}/chatMessages`), (messages) => {
    const newMessages = messages || [];
    newMessages.push({ senderIndex: myPlayerIndex, text: text, timestamp: Date.now() });
    if (newMessages.length > 50) newMessages.shift();
    return newMessages;
  });
};

// === Rulebook ===
window._showRulebook = function() {
  const overlay = document.createElement('div');
  overlay.className = 'rulebook-overlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="rulebook-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <span style="font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--neon-cyan);text-shadow:0 0 5px var(--neon-cyan);">DATABASE_RULE</span>
        <button class="btn btn-ghost" style="padding:4px 12px;font-size:13px" onclick="this.closest('.rulebook-overlay').remove()">[X] CLOSE</button>
      </div>

      <div class="rule-section">
        <h3>> OBJECTIVE</h3>
        <div class="rule-row"><span>「18」は、10回のじゃんけんでより多くのポイントを獲得した方が勝利する心理戦ゲームです。</span></div>
        <div class="rule-row"><span style="color:var(--red);font-weight:700">最大の制約：10回で使える「指」は合計18本までです！</span></div>
      </div>

      <div class="rule-section">
        <h3>> COSTS</h3>
        <table class="rule-table" style="margin-bottom:8px">
          <tr><th>出す手</th><th>消費する指の数</th></tr>
          <tr><td>🖐️ パー</td><td>5本</td></tr>
          <tr><td>✌️ チョキ</td><td>2本</td></tr>
          <tr><td>✊ グー</td><td>0本（無限に出せる）</td></tr>
        </table>
        <div class="rule-row" style="font-size:11px; color:var(--text-muted)">指が足りない手は出すことができません。</div>
      </div>

      <div class="rule-section">
        <h3>> REWARDS</h3>
        <div class="rule-row"><span>じゃんけんに勝利すると <strong>+1ポイント</strong> 獲得。（あいこは0点）</span></div>
        <div class="rule-row"><span>🔥 <strong>第6回戦</strong>と<strong>第10回戦</strong>に勝つと、特別に <strong>+2ポイント</strong> 獲得できます。</span></div>
      </div>

      <div class="rule-section">
        <h3>> WARNING: PENALTY</h3>
        <div class="rule-row"><span>全10ラウンド終了後、手持ちの18本の指を<strong>余らせてしまった場合、余った本数×1点が最終スコアから減点</strong>されます。</span></div>
        <div class="rule-row"><span>計画的に「パー」や「チョキ」を使って、ぴったり18本を使い切るのが勝利への鍵です。</span></div>
      </div>

      <button class="btn btn-primary btn-full" style="margin-top:16px" onclick="this.closest('.rulebook-overlay').remove()">> CLOSE_DATABASE</button>
    </div>
  `;
  document.body.appendChild(overlay);
};

window._leaveRoom = async function() {
  if (roomCode) {
    if (roomListener) off(ref(db, `games/rooms18/${roomCode}`));
    const snap = await get(ref(db, `games/rooms18/${roomCode}`));
    if (snap.exists()) {
      const st = snap.val();
      if (myPlayerIndex === 0) {
        await set(ref(db, `games/rooms18/${roomCode}`), null);
      } else {
        if (st.players) {
          st.players.splice(myPlayerIndex, 1);
          await update(ref(db, `games/rooms18/${roomCode}`), { players: st.players });
        }
      }
    }
  }
  location.href = '../';
};
</script>
</body>
</html>
